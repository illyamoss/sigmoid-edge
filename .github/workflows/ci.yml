name: Continuous Integration Guardrail

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Node.js runtime environment
        uses: actions/setup-node@v4
        with:
          node-with-cache: 'npm'
          node-version: 20

      - name: Install exact dependencies
        run: npm ci

      - name: Verify strict TypeScript compilation
        run: npx tsc --noEmit

      - name: Test production build compilation
        run: npm run build
